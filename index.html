<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1초의 선택 - 당신의 상식은 정말 맞을까?</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.5s ease; /* 계절별 배경 전환 애니메이션 */
        }

        /* 계절별 동적 배경 테마 */
        body.spring { background-color: #2b1b28; }
        body.summer { background-color: #0d2830; }
        body.autumn { background-color: #2e1d11; }
        body.winter { background-color: #111a2e; }

        #game-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .scene {
            display: none;
        }
        .scene.active {
            display: block;
        }
        h1 {
            font-size: 2.3rem;
            color: #FF4D00;
            margin-bottom: 10px;
            word-break: keep-all;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.5;
            word-break: keep-all;
        }
        p.description {
            font-size: 1.05rem;
            color: #AAAAAA;
            margin-bottom: 30px;
            line-height: 1.7;
            word-break: keep-all;
        }
        /* 이름 입력 칸 스타일 */
        .input-name {
            width: 80%;
            max-width: 300px;
            padding: 12px 20px;
            font-size: 1.1rem;
            border: 2px solid #333;
            border-radius: 25px;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-name:focus {
            border-color: #FF4D00;
        }
        button {
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .btn-main {
            background-color: #FF4D00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 10px;
        }
        .btn-main:hover {
            background-color: #E64500;
            transform: scale(1.05);
        }
        .choices-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 25px;
        }
        .btn-choice {
            background-color: #252525;
            color: white;
            border: 2px solid #333333;
            padding: 18px;
            font-size: 1rem;
            text-align: left;
            border-radius: 10px;
            line-height: 1.4;
            word-break: keep-all;
        }
        .btn-choice:hover {
            border-color: #FF4D00;
            background-color: #2A2A2A;
        }
        .feedback-text {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 30px;
            background-color: #1A1A1A;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #FF4D00;
            text-align: left;
            word-break: keep-all;
        }
        .score-badge {
            font-size: 1.2rem;
            color: #FF4D00;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
            border: 1px solid #FF4D00;
            padding: 5px 15px;
            border-radius: 15px;
        }
        .progress-bar {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
        }
        /* 랭킹 테이블 스타일 */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 30px;
            background-color: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
        }
        .leaderboard-table th {
            background-color: #222;
            color: #FF4D00;
            font-weight: bold;
        }
        .leaderboard-table tr:first-child td {
            color: #FFD700; /* 1등은 금색 */
            font-weight: bold;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">

        <div id="scene-start" class="scene active">
            <h1>《1초의 선택》</h1>
            <h2>계절별 고난도 응급상황, 당신의 상식은 정말 맞을까?</h2>
            <p class="description">
                당신은 지금부터 10개의 계절별 응급 상황을 마주하게 됩니다.<br>
                정답은 단 하나뿐이며, 잘못된 민간상식은 생명을 위협할 수 있습니다.<br>
            </p>
            
            <div>
                <input type="text" id="player-name-input" class="input-name" placeholder="참여자 이름을 입력하세요" maxlength="10">
            </div>
            <button class="btn-main" onclick="startQuiz()">START</button>
        </div>

        <div id="scene-quiz" class="scene">
            <div id="quiz-progress" class="progress-bar">문제 1 / 10</div>
            <p id="quiz-icon" class="description">📱 상황 발생</p>
            <h2 id="quiz-title">상황 질문 텍스트 영역</h2>
            <div id="quiz-choices" class="choices-container"></div>
        </div>

        <div id="scene-feedback" class="scene">
            <h2>당신의 선택 결과</h2>
            <div id="feedback-content" class="feedback-text"></div>
            <button class="btn-main" onclick="goToNext()">다음 상황으로</button>
        </div>

        <div id="scene-result" class="scene">
            <h1>진단 완료</h1>
            <div id="score-display" class="score-badge">10문제 중 0개 올바른 판단</div>
            
            <h2>당신의 대처 판단 유형</h2>
            <div id="type-content" class="feedback-text" style="border-left-color: #4CAF50;"></div>

            <h2>🏆 실시간 명예의 전당 (순위표)</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>이름</th>
                        <th>맞힌 개수</th>
                        <th>기록 시간</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>

            <p class="description">
                오늘 배운 올바른 대처법을 꼭 기억해 주세요!
            </p>
            <button class="btn-main" onclick="location.reload()">다시 도전하기</button>
        </div>

    </div>

    <script>
        const quizData = [
            {
                season: "spring",
                icon: "🌸 [봄] 상황 1: 야외 벌침 쏘임",
                title: "봄철 야외 활동 중 벌에 쏘여 피부에 벌침이 박힌 것을 발견했다. 독소의 전신 확산을 막기 위한 가장 올바른 현장 처치는?",
                choices: [
                    { text: "① 2차 감염 방지를 위해 정밀 집게(핀셋)로 침 뿌리 끝을 꼭 잡아당겨 단번에 제거한다.", type: "danger", correct: false },
                    { text: "② 신용카드나 플라스틱 카드의 모서리로 피부를 결 따라 살살 긁어 밀어낸다.", type: "evidence", correct: true }, // 정답: ②
                    { text: "③ 독이 위쪽으로 오르는 것을 막기 위해 쏘인 부위 위쪽을 혈관이 통하지 않게 바짝 묶는다.", type: "danger", correct: false },
                    { text: "④ 독을 중화하기 위해 소독용 알코올이나 된장을 두껍게 바르고 압박 붕대를 감는다.", type: "observation", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 핀셋으로 침을 잡으면 독주머니를 압박해 남아있는 독이 순식간에 체내로 추가 주입됩니다. 카드로 살살 긁어서 쳐내는 것이 정석입니다.",
                wrongFeedback: "[위험한 선택입니다!] 핀셋 사용 시 독주머니가 터져 독이 더 들어갈 위험이 크며, 피가 안 통할 정도로 묶거나 검증되지 않은 물질을 바르는 것은 2차 괴사와 감염을 유발합니다."
            },
            {
                season: "spring",
                icon: "🌸 [봄] 상황 2: 꽃가루 급성 아나필락시스",
                title: "봄철 꽃가루에 노출된 환자가 갑자기 호흡 곤란과 기도 부종을 호소한다. 이 상황에서 절대로 해서는 안 되는 위험한 대처는?",
                choices: [
                    { text: "① 자가주사용 에피네프린을 소지한 경우 환자의 허벅지 대퇴부 외측에 주사한다.", type: "evidence", correct: false },
                    { text: "② 호흡 곤란을 호소하므로 상체를 살짝 일으켜 편안하게 해준다.", type: "prompt", correct: false },
                    { text: "③ 환자 의식이 흐려지면 즉시 119에 신고하고 체온 유지를 도모한다.", type: "observation", correct: false },
                    { text: "④ 혀가 뒤로 말려 기도가 막히는 것을 방지하기 위해 입안에 손가락을 넣어 혀를 잡아당겨 준다.", type: "danger", correct: true } // 정답: ④
                ],
                correctFeedback: "[훌륭한 판단입니다!] 의식이 희미하거나 경련 중인 환자의 입에 손을 넣는 것은 구급자의 손이 물리거나 구강 상처로 환자 기도를 완전 폐쇄시키는 최악의 행동입니다.",
                wrongFeedback: "[위험한 선택입니다!] 환자의 입안에 강제로 물건이나 손을 넣으면 불필요한 구토나 기도 폐쇄를 일으키므로 절대로 해서는 안 됩니다."
            },
            {
                season: "summer",
                icon: "🌊 [여름] 상황 3: 폭우 시 침수 차량 갇힘",
                title: "집중호우로 도로가 침수되어 차 안에 갇혔다. 외부 수압 때문에 문이 전혀 열리지 않을 때 최선의 탈출 행동은?",
                choices: [
                    { text: "① 내부로 물이 차오를 때까지 기다려 안과 밖의 수위 차가 약 30cm 이하로 줄었을 때 문을 밀어서 연다.", type: "evidence", correct: true }, // 정답: ①
                    { text: "② 창문이 열리지 않을 때 가장 크고 단단한 차량 앞유리 중앙을 발로 힘껏 차서 깬다.", type: "danger", correct: false },
                    { text: "③ 산소가 손실되는 것을 막기 위해 창문과 문을 완전히 밀폐한 뒤 외부 구조대를 기다린다.", type: "observation", correct: false },
                    { text: "④ 시트 헤드레스트 쇠꼬챙이로 차량 앞유리 가장자리를 강하게 때려 깨뜨린다.", type: "danger", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 외부 수압 차이가 심할 땐 문이 안 열립니다. 차 안쪽에 물이 가슴 높이까지 찼을 때 수압 차가 감소하여 쉽게 문을 열 수 있습니다. (창문 파괴 시에는 앞유리가 아닌 측면 유리 모서리를 노려야 합니다.)",
                wrongFeedback: "[위험한 선택입니다!] 앞유리는 특수 접합 강화유리라 깨지지 않으며, 대기만 하다가 수위가 너무 높아지면 탈출 타이밍을 완전히 놓치게 됩니다."
            },
            {
                season: "summer",
                icon: "🌊 [여름] 상황 4: 해파리 쏘임 사고",
                title: "피서지에서 해파리에 쏘여 피부에 채찍 모양 팽진과 극심한 통증이 발생했다. 가장 치명적인 잘못된 세척법은?",
                choices: [
                    { text: "① 현장의 바닷물을 이용하여 쏘인 부위를 살살 흘려보내며 씻어낸다.", type: "evidence", correct: false },
                    { text: "② 40~45도 정도의 따뜻한 물로 온찜질 조치한다.", type: "prompt", correct: false },
                    { text: "③ 깨끗하고 시원한 수돗물이나 음용 생수로 상처 부위를 구석구석 세척한다.", type: "danger", correct: true }, // 정답: ③
                    { text: "④ 장갑을 끼거나 도구를 이용하여 피부에 남아있는 촉수를 안전하게 제거한다.", type: "evidence", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 수돗물이나 순수한 민물은 삼투압 작용을 일으켜 잔존하는 해파리 자포(독침)를 대량 폭발시킵니다. 반드시 바닷물이나 생리식염수로 세척해야 합니다.",
                wrongFeedback: "[위험한 선택입니다!] 수돗물 세척은 잔존 독침에서 독이 모조리 몸 안으로 분출되게 만드는 지극히 위험한 조치입니다."
            },
            {
                season: "summer",
                icon: "🌊 [여름] 상황 5: 폭염 속 급성 열경련",
                title: "한여름 야외 활동 중 의식은 있으나 쥐가 나듯 심한 근육 경련과 무기력증을 호소하는 '열경련' 환자 발생 시 잘못된 대처는?",
                choices: [
                    { text: "① 환자를 즉시 시원한 그늘이나 에어컨이 작동하는 실내로 이동시킨다.", type: "prompt", correct: false },
                    { text: "② 빠른 염분 보충을 위해 삼키기 힘들어해도 고농도 소금물을 강제로 복용시킨다.", type: "danger", correct: true }, // 정답: ②
                    { text: "③ 전해질과 수분 보충을 위해 이온 음료를 조금씩 마시게 한다.", type: "evidence", correct: false },
                    { text: "④ 경련이 일어난 근육 부위를 부드럽게 스트레칭하고 마사지해준다.", type: "observation", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 고농도 소금물이나 정제 소금을 강제로 삼키게 하면 위장 장애 및 급격한 오심/구토로 기도 흡인 쇼크를 일으킬 수 있습니다.",
                wrongFeedback: "[위험한 선택입니다!] 삼키기 힘든 상태에서의 소금물 강제 복용은 구토 시 기도를 막아 2차 응급상황을 유발합니다."
            },
            {
                season: "autumn",
                icon: "🍁 [가을] 상황 6: 가을 독사 물림",
                title: "가을 단풍 산행 중 독사에 발목을 물렸다. 선명한 독니 자국 두 개와 함께 부종이 일어날 때 절대 해서는 안 되는 행동은?",
                choices: [
                    { text: "① 물린 부위를 입으로 바짝 대고 직접 빨아내어 독을 빼내려고 시도한다.", type: "danger", correct: true }, // 정답: ①
                    { text: "② 환자를 편안히 눕히고 물린 다리를 심장 높이보다 낮게 위치시킨다.", type: "evidence", correct: false },
                    { text: "③ 물린 부위 위쪽 5~10cm 지점을 손가락 하나가 들어갈 정도의 세기로 묶는다.", type: "evidence", correct: false },
                    { text: "④ 뱀의 종류 파악과 항독소 투여를 위해 뱀의 형상을 사진으로 찍어둔다.", type: "prompt", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 입으로 독을 빨아내는 행위는 구강 내 미세 상처를 통해 구급자에게 독이 침투하거나 구강 세균으로 상처에 치명적인 2차 감염을 일으킵니다.",
                wrongFeedback: "[위험한 선택입니다!] 영화나 미디어처럼 입으로 독을 빨아내는 행동은 2차 중독 및 심각한 2차 세균 감염을 일으키는 최악의 민간요법입니다."
            },
            {
                season: "autumn",
                icon: "🍁 [가을] 상황 7: 야외활동 후 쯔쯔가무시증",
                title: "가을철 야외 활동 일주일 후 고열과 함께 피부에서 '검은 딱지(가사)'가 발견되었다. 올바른 대처법은?",
                choices: [
                    { text: "① 단순 감기몸살로 판단하여 일반 해열제만 먹고 며칠간 경과를 관찰한다.", type: "observation", correct: false },
                    { text: "② 검은 딱지를 억지로 떼어내고 후시딘 등 일반 상처 연고를 두껍게 바른다.", type: "danger", correct: false },
                    { text: "③ 쯔쯔가무시증을 의심하고 즉시 병원에 방문하여 야외 활동 이력을 의료진에게 알린다.", type: "evidence", correct: true }, // 정답: ③
                    { text: "④ 열을 낮추기 위해 즉시 찬물에 전신을 담가 물리적 냉각 조치를 취한다.", type: "danger", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 털진드기 유충에 의해 발생하는 쯔쯔가무시증은 특유의 궤양성 검은 딱지가 특징입니다. 즉시 항생제 치료를 받지 않으면 다발성 장기 부전 등 중증 합병증으로 이어집니다.",

            {

                title: "겨울철 등산 중 체온이 떨어져 의식을 잃어가는 중증 저체온증 환자를 발견했다. 가장 위험한 응급 처치는?",
                choices: [
                    { text: "① 체온을 신속히 올리기 위해 환자를 뜨거운 열탕에 넣거나 난로 불에 바짝 대어 가온한다.", type: "danger", correct: true }, // 정답: ①
                    { text: "② 환자의 젖은 옷을 잘라내어 벗긴 후 따뜻한 마른 담요로 감싸준다.", type: "evidence", correct: false },
                    { text: "③ 심장마비를 방지하기 위해 환자의 몸을 거칠게 흔들거나 주무르지 않는다.", type: "observation", correct: false },
                    { text: "④ 따뜻한 실내로 이동시키고 즉시 119에 신고한다.", type: "prompt", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 중증 저체온증 환자에게 급격한 열을 가하면 표피 혈관이 급속히 확장되면서 차가운 말초 혈액이 심장으로 몰려 쇼크사(Rewarming Shock)를 일으킵니다.",
                wrongFeedback: "[위험한 선택입니다!] 뜨거운 물이나 직화로 급격히 가온하는 조치는 치명적인 재가온 쇼크 및 심정지를 유발하는 가장 위험한 행동입니다."
            },
            {
                season: "winter",
                icon: "❄️ [겨울] 상황 9: 손가락 중증 동상",
                title: "겨울철 야외 작업 후 손가락이 창백해지고 감각이 마비되는 동상이 발생했다. 잘못된 처치법은?",
                choices: [
                    { text: "① 37~42℃ 정도의 미지근한 물에 20~40분간 담가 천천히 녹여준다.", type: "evidence", correct: false },
                    { text: "② 동상 부위에 생성된 물집을 터뜨리지 않고 소독 거즈로 보호한다.", type: "observation", correct: false },
                    { text: "③ 마찰열을 발생시켜 혈액 순환을 돕기 위해 동상 부위를 세게 비비고 주무른다.", type: "danger", correct: true }, // 정답: ③
                    { text: "④ 병원 이송 시 동상 부위가 다시 얼어붙지 않도록 따뜻하게 유지한다.", type: "prompt", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 얼어붙은 동상 부위의 조직을 비비거나 주무르면 얼음 결정이 세포막을 찢어 영구적인 조직 괴사를 유발합니다.",
                wrongFeedback: "[위험한 선택입니다!] 얼어붙은 부위를 마찰시키면 세포 조직이 파괴되어 손가락 절단 가능성이 급증합니다."
            },
            {
                season: "winter",
                icon: "❄️ [겨울] 상황 10: 빙판길 낙상과 척추 손상",
                title: "겨울철 빙판길에서 크게 넘어지며 엉덩방아를 찧은 후 허리 통증과 함께 다리 감각 이상을 호소한다. 올바른 행동은?",
                choices: [
                    { text: "① 뼈에 이상이 없는지 확인하기 위해 즉시 환자를 일으켜 세워 보행을 시켜본다.", type: "danger", correct: false },
                    { text: "② 척추 신경 손상 심화를 막기 위해 119가 올 때까지 임의로 움직이지 않게 고정시킨다.", type: "evidence", correct: true }, // 정답: ②
                    { text: "③ 뭉친 근육을 풀고 뼈를 맞추기 위해 통증 부위를 힘주어 주무른다.", type: "danger", correct: false },
                    { text: "④ 충격을 완화하기 위해 환자의 상체를 동그랗게 구부려준다.", type: "observation", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 척추 골절 및 손상이 의심될 때 환자를 일으키거나 움직이면 부러진 뼈 조각이 척수 신경을 눌러 전신 마비를 일으킵니다.",
                wrongFeedback: "[위험한 선택입니다!] 척추 손상 환자를 무리하게 일으키거나 주무르는 행위는 평생 전신 마비로 이어질 수 있는 위험천만한 조치입니다."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let playerName = "무명 참여자";

        const personalityScores = {
            prompt: 0,
            evidence: 0,
            observation: 0,
            danger: 0
        };

        // 퀴즈 시작 기능
        function startQuiz() {
            const nameInput = document.getElementById('player-name-input');
            const nameVal = nameInput.value.trim();

            if (nameVal === "") {
                alert("이름을 꼭 적어주세요!");
                nameInput.focus();
                return;
            }

            playerName = nameVal; // 이름 저장
            currentQuestionIndex = 0;
            score = 0;
            personalityScores.prompt = 0;
            personalityScores.evidence = 0;
            personalityScores.observation = 0;
            personalityScores.danger = 0;
            
            showQuestion();
            nextScene('scene-quiz');
        }

        function nextScene(sceneId) {
            const scenes = document.querySelectorAll('.scene');
            scenes.forEach(scene => scene.classList.remove('active'));
            document.getElementById(sceneId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function showQuestion() {
            const data = quizData[currentQuestionIndex];
            
            // 계절에 맞춰 전체 화면 배경색 변경
            document.body.className = data.season;

            document.getElementById('quiz-progress').innerText = `상황 ${currentQuestionIndex + 1} / 10`;
            document.getElementById('quiz-icon').innerText = data.icon;
            document.getElementById('quiz-title').innerText = data.title;

            const choicesContainer = document.getElementById('quiz-choices');
            choicesContainer.innerHTML = '';

            data.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'btn-choice';
                btn.innerText = choice.text;
                btn.onclick = () => selectAnswer(choice);
                choicesContainer.appendChild(btn);
            });
        }

        function selectAnswer(choice) {
            const currentData = quizData[currentQuestionIndex];
            const feedbackContent = document.getElementById('feedback-content');

            if (personalityScores[choice.type] !== undefined) {
                personalityScores[choice.type] += 1;
            }

            if (choice.correct) {
                score += 1;
                feedbackContent.innerHTML = `
                    <span style="color: #4CAF50; font-weight:bold; font-size:1.2rem;">🟢 올바른 대처입니다!</span><br><br>
                    ${currentData.correctFeedback}
                `;
            } else {
                feedbackContent.innerHTML = `
                    <span style="color: #F44336; font-weight:bold; font-size:1.2rem;">❌ 잘못된 민간상식 조치입니다!</span><br><br>
                    ${currentData.wrongFeedback}
                `;
            }

            nextScene('scene-feedback');
        }

        function goToNext() {
            currentQuestionIndex += 1;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
                nextScene('scene-quiz');
            } else {
                showResult();
            }
        }

        // 랭킹 저장 및 동적 그리기
        function handleRanking(name, finalScore) {
            let rankings = JSON.parse(localStorage.getItem('quizRankings')) || [];

            const dateStr = new Date().toLocaleDateString('ko-KR', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            const newRecord = {
                name: name,
                score: finalScore,
                time: dateStr
            };

            rankings.push(newRecord);
            rankings.sort((a, b) => b.score - a.score);

            rankings = rankings.slice(0, 10);

            localStorage.setItem('quizRankings', JSON.stringify(rankings));

            const leaderboardBody = document.getElementById('leaderboard-body');
            leaderboardBody.innerHTML = '';

            rankings.forEach((record, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}위</td>
                    <td>${record.name}</td>
                    <td>${record.score}개</td>
                    <td style="font-size:0.85rem; color:#888;">${record.time}</td>
                `;
                leaderboardBody.appendChild(tr);
            });
        }

        function showResult() {
            document.body.className = '';

            document.getElementById('score-display').innerText = `${playerName}님은 10문제 중 ${score}개 올바른 판단`;

            let maxType = 'evidence';
            let maxScore = -1;
            for (const [type, val] of Object.entries(personalityScores)) {
                if (val > maxScore) {
                    maxScore = val;
                    maxType = type;
                }
            }

            const typeContent = document.getElementById('type-content');
            
            if (maxType === 'prompt') {
                typeContent.innerHTML = `
                    <strong>⚡ 신속형 의사결정자 (The Prompt Responder)</strong><br><br>
                    ${playerName}님은 응급상황에서 망설임 없이 확실한 구급 조치와 골든타임을 확보하려 노력하는 빠른 판단력의 소유자입니다. 생과 사를 가르는 치명적인 위기일수록 당신과 같은 단호함이 생명을 살려냅니다.
                `;
            } else if (maxType === 'evidence') {
                typeContent.innerHTML = `
                    <strong>📚 의학 근거형 분석가 (The Evidence-based Caregiver)</strong><br><br>
                    ${playerName}님은 어설픈 선입견에 의지하지 않고 현대 응급의학의 입증된 사실과 디테일한 처치법을 숙지하고 있는 든든한 상식가입니다. 복잡하게 얽힌 응급 지침을 냉철하게 고르는 탁월한 브레인입니다.
                `;
            } else if (maxType === 'observation') {
                typeContent.innerHTML = `
                    <strong>🔍 신중한 관찰자 (The Calm Watcher)</strong><br><br>
                    ${playerName}님은 환자 상태를 지켜보고 불필요한 움직임을 제한하여 환자를 위험으로부터 보호하려 합니다. 신중함은 좋으나, 아나필락시스나 골절 상태에서는 과감하고 정확한 조치가 생존율을 대폭 끌어올린다는 것을 명심해 주세요.
                `;
            } else {
                typeContent.innerHTML = `
                    <strong>⚠️ 위험감수형 상식가 (The Risky Folk-mediciner)</strong><br><br>
                    ${playerName}님은 영화나 미디어, 잘못 전파된 민간지식에 의도치 않게 익숙했던 편입니다. 하지만 안타깝게도 우리가 '안전하다'고 믿었던 강제 가온, 비비기, 입으로 빨아내기 등은 환자의 치사율을 가속시키는 요인입니다. 이번 테스트로 완전히 바로잡으셨길 바랍니다!
                `;
            }

            handleRanking(playerName, score);

            nextScene('scene-result');
        }
    </script>
</body>
