<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1초의 선택 - 당신의 상식은 정말 맞을까?</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .scene {
            display: none;
        }
        .scene.active {
            display: block;
        }
        h1 {
            font-size: 2.3rem;
            color: #FF4D00;
            margin-bottom: 10px;
            word-break: keep-all;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.5;
            word-break: keep-all;
        }
        p.description {
            font-size: 1.05rem;
            color: #AAAAAA;
            margin-bottom: 30px;
            line-height: 1.7;
            word-break: keep-all;
        }
        button {
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .btn-main {
            background-color: #FF4D00;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 20px;
        }
        .btn-main:hover {
            background-color: #E64500;
            transform: scale(1.05);
        }
        .choices-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 25px;
        }
        .btn-choice {
            background-color: #252525;
            color: white;
            border: 2px solid #333333;
            padding: 18px;
            font-size: 1rem;
            text-align: left;
            border-radius: 10px;
            line-height: 1.4;
            word-break: keep-all;
        }
        .btn-choice:hover {
            border-color: #FF4D00;
            background-color: #2A2A2A;
        }
        .feedback-text {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 30px;
            background-color: #1A1A1A;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #FF4D00;
            text-align: left;
            word-break: keep-all;
        }
        .score-badge {
            font-size: 1.2rem;
            color: #FF4D00;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
            border: 1px solid #FF4D00;
            padding: 5px 15px;
            border-radius: 15px;
        }
        .progress-bar {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">

        <div id="scene-start" class="scene active">
            <h1>《1초의 선택》</h1>
            <h2>당신의 상식은 정말 맞을까?</h2>
            <p class="description">
                당신은 지금부터 10개의 일상 속 응급 상황을 마주하게 됩니다.<br>
                정답은 단 하나뿐이며, 잘못된 상식은 생명을 위협할 수 있습니다.<br><br>
            </p>
            <button class="btn-main" onclick="startQuiz()">START</button>
        </div>

        <div id="scene-quiz" class="scene">
            <div id="quiz-progress" class="progress-bar">문제 1 / 10</div>
            <p id="quiz-icon" class="description">📱 상황 발생</p>
            <h2 id="quiz-title">상황 질문 텍스트 영역</h2>
            <div id="quiz-choices" class="choices-container">
                </div>
        </div>

        <div id="scene-feedback" class="scene">
            <h2>당신의 선택 결과</h2>
            <div id="feedback-content" class="feedback-text"></div>
            <button class="btn-main" onclick="goToNext()">다음 상황으로</button>
        </div>

        <div id="scene-result" class="scene">
            <h1>진단 완료</h1>
            <div id="score-display" class="score-badge">10문제 중 0개 올바른 판단</div>
            
            <h2>당신의 대처 판단 유형</h2>
            <div id="type-content" class="feedback-text" style="border-left-color: #4CAF50;">
                </div>

            <p class="description">
                우리는 응급처치를 아예 모르는 것이 아니라,<br>
                잘못된 상식으로 알고 있는 경우가 더 많습니다.<br>
                오늘 배운 올바른 대처법을 꼭 기억해 주세요!
            </p>
            <button class="btn-main" onclick="location.reload()">다시 도전하기</button>
        </div>

    </div>

    <script>
        const quizData = [
            {
                icon: "🏀 상황 1: 운동 중 부상",
                title: "체육 시간, 농구를 하다가 부딪혀 친구의 앞니가 뿌리째 통째로 빠져버렸다. 어떻게 해야 할까?",
                choices: [
                    { text: "① 세균 감염을 막기 위해 멸균 거즈와 수돗물로 치아 표면을 깨끗하게 비벼 씻어 가져간다.", type: "danger", correct: false },
                    { text: "② 치아가 마르지 않도록 우유나 생리식염수에 담가 30분 이내에 병원으로 간다.", type: "evidence", correct: true },
                    { text: "③ 치아가 다시 고정될 수 있도록 빠진 잇몸 뼈 자리에 도로 꾹 밀어 넣고 거즈를 물린다.", type: "danger", correct: false },
                    { text: "④ 세포가 마르지 않게 치아 뿌리 부분을 손가락으로 단단히 잡고 구강 청결제에 소독해 가져간다.", type: "observation", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 치아 뿌리에는 미세한 신경과 인대 조직이 있습니다. 마르거나 수돗물의 화학 성분에 노출되면 세포가 괴사하므로 흰 우유나 생리식염수에 보관하는 것이 정답입니다.",
                wrongFeedback: "[위험한 선택입니다!] 수돗물이나 구강 청결제로 세척하는 것은 뿌리에 붙은 중요한 신경 조직을 파괴합니다. 또한 억지로 밀어 넣으면 잇몸 뼈와 2차 신경 손상을 유발합니다."
            },
            {
                icon: "📱 상황 2: 카페인 과다",
                title: "시험기간, 에너지음료를 연달아 4캔 마신 친구가 갑자기 '심장이 비정상적으로 뛰고 호흡이 곤란해...'라며 고통을 호소한다.",
                choices: [
                    { text: "① 체내 카페인 농도를 희석하기 위해 이온 음료를 급하게 다량 마시게 한다.", type: "danger", correct: false },
                    { text: "② 혈액 순환을 돕기 위해 신속하게 눕힌 뒤, 다리를 머리보다 높게 들어 올린다.", type: "danger", correct: false },
                    { text: "③ 즉시 119를 부르거나 지체 없이 병원 응급실로 즉각 이동한다.", type: "prompt", correct: true },
                    { text: "④ 전해질 불균형에 의한 경련일 수 있으니 안정을 유도하며 상체를 따뜻하게 감싸준다.", type: "observation", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 고카페인 섭취로 인한 급성 빈맥이나 부정맥은 일반적인 휴식으로 호전되지 않으며, 심정지 쇼크로 이어질 수 있는 즉각적인 처치가 필요한 의료 응급 상황입니다.",
                wrongFeedback: "[위험한 선택입니다!] 임의로 물이나 전해질 음료를 다량 급여하는 것은 급격한 구토 유발이나 기도 폐쇄로 이어질 수 있으며, 혈액을 뇌로 쏠리게 하는 자세 또한 부정맥 환자에게 매우 위험합니다."
            },
            {
                icon: "⛰️ 상황 3: 독사 물림",
                title: "야외 활동 중 독사에 발목을 물렸다. 선명한 잇자국 두 개와 함께 상처가 붉게 부어오른다.",
                choices: [
                    { text: "① 독이 전신으로 퍼지는 것을 지연시키기 위해 상처 부위에 얼음 팩을 대고 압박한다.", type: "danger", correct: false },
                    { text: "② 신속하게 상처를 칼로 살짝 째고 입에 상처가 없는 사람이 독을 완전히 빨아낸다.", type: "danger", correct: false },
                    { text: "③ 물린 부위 위쪽(심장 방향) 5~10cm를 손가락 하나가 들어갈 정도로 묶고, 최대한 움직임을 통제하며 이송한다.", type: "evidence", correct: true },
                    { text: "④ 혈류 흐름을 빠르게 하여 독을 몸 밖으로 흘려보내기 위해 물린 다리를 심장보다 높게 올린다.", type: "prompt", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 심장보다 물린 부위를 낮게 유지하고, 과도한 움직임을 차단해야 림프 순환을 통한 독의 확산을 늦춥니다. 너무 꽉 조이면 오히려 괴사가 일어나므로 알맞은 세기로 묶는 것이 중요합니다.",
                wrongFeedback: "[위험한 선택입니다!] 얼음을 대거나 칼로 째는 행위는 심각한 조직 손상 및 괴사를 촉진합니다. 구강 흡입 역시 구강 점막을 통해 독이 2차 흡수되므로 절대 금기 사항입니다."
            },
            {
                icon: "🦟 상황 4: 귀 속 벌레",
                title: "야영 도중 귀 안으로 날벌레가 날아 들어갔다. 버둥거리는 느낌에 극심한 고통과 함께 고막 통증이 느껴진다.",
                choices: [
                    { text: "① 벌레를 자극하지 않고 기름 성분(올리브유, 베이비오일 등)을 귓구멍에 한두 방울 넣어 서서히 죽여 나오게 한다.", type: "evidence", correct: true },
                    { text: "② 빛을 좋아하는 곤충의 본성을 이용하여 손전등 불빛을 귓구멍에 바짝 밀착시켜 비춘다.", type: "danger", correct: false },
                    { text: "③ 귀지용 면봉이나 핀셋을 이용해 벌레가 고막을 손상시키지 못하도록 신속히 끄집어낸다.", type: "danger", correct: false },
                    { text: "④ 귓구멍 입구에 담배 연기나 모기향 연기를 불어넣어 벌레가 질식해서 스스로 나오도록 유도한다.", type: "observation", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 식용유나 베이비오일을 넣으면 귓속 벌레를 질식시켜 얌전하게 만들고 고막 손상을 방지합니다. 이후 이비인후과에서 안전하게 사체를 제거해야 합니다.",
                wrongFeedback: "[위험한 선택입니다!] 좁은 이도에 불을 비추거나 연기를 넣으면, 벌레가 위협을 느끼고 더 안쪽으로 격렬히 파고들어 고막 파열 및 외이도염을 일으킬 확률이 급증합니다."
            },
            {
                icon: "🏊 상황 5: 마른 익사",
                title: "계곡에서 물에 빠졌던 친구를 무사히 구조했다. 물을 조금 토하더니 스스로 걸으며 완전히 괜찮다고 한다.",
                choices: [
                    { text: "① 물에 완전히 노출되었던 환자이므로 온열 요법을 유도하고, 따뜻한 우유나 차를 지속해서 먹인다.", type: "observation", correct: false },
                    { text: "② 급격한 수분 흡입으로 인해 저나트륨혈증이 발생할 수 있으므로 식염수를 소량 복용시킨다.", type: "danger", correct: false },
                    { text: "③ 본인이 완전히 괜찮다고 하며 호흡에 지장이 없으므로 따뜻한 텐트 안에서 잠을 자며 완전히 안정을 취하게 한다.", type: "danger", correct: false },
                    { text: "④ 기도에 들어간 소량의 물이 서서히 폐 손상을 일으키는 '지연성 익사' 가능성이 있으므로 즉시 응급실로 간다.", type: "evidence", correct: true }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 소량의 물이 폐로 들어갈 경우, 수 시간 내에 폐부종을 유발하여 호흡이 마비되는 '지연성 익사(마른 익사)'가 올 수 있으므로 반드시 정밀 의료 진료가 필수적입니다.",
                wrongFeedback: "[위험한 선택입니다!] '멀쩡해 보여서 안심하고 잠을 재우는 것'이 마른 익사 사고의 가장 흔한 원인입니다. 물을 먹은 후 수 시간 동안은 주의 깊은 관찰과 예방 조치가 생명을 살립니다."
            },
            {
                icon: "🧪 상황 6: 화학물질 눈 유입",
                title: "화장실 청소 중 알칼리성 락스 세제가 눈에 강하게 튀어 들어갔다. 극심한 안구 통증이 시작된다.",
                choices: [
                    { text: "① 안구 표면을 보호하기 위해 다량의 인공눈물을 눈 표면에 분사하고 안대를 씌워 즉시 병원으로 향한다.", type: "observation", correct: false },
                    { text: "② 화학 성분의 안구 침투를 막기 위해 착용 중인 콘택트렌즈부터 핀셋 등을 활용해 빠르게 빼낸다.", type: "danger", correct: false },
                    { text: "③ 흐르는 수돗물이나 생리식염수를 이용해 눈꺼풀을 벌려 눈구석 방향으로 최소 15~20분 이상 지속해서 씻어낸다.", type: "evidence", correct: true },
                    { text: "④ 산성 물질인 식초나 우유를 약하게 타서 산-알칼리 화학적 중화 반응을 이용해 눈을 세척한다.", type: "danger", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 산이나 알칼리 성분이 눈에 들어갔을 때는 중화 반응을 꾀하려 하지 말고 흐르는 다량의 깨끗한 물로 화학 물질의 절대적인 농도를 씻어내는 것이 각막 손상을 줄이는 철칙입니다.",
                wrongFeedback: "[위험한 선택입니다!] 화학 물질로 오염된 눈을 산이나 염기로 중화시키려 하면 열이 발생해 2차 안구 화상을 일으킵니다. 렌즈를 빼는 행위 또한 안구 상처를 넓히므로 세척이 급선무입니다."
            },
            {
                icon: "🩹 상황 7: 손가락 절단",
                title: "작업 도중 손가락 끝마디가 완전히 잘려 나가는 불의의 사고가 발생했다.",
                choices: [
                    { text: "① 절단된 부위가 오염되지 않도록 알코올이나 소독액에 완전히 침수시켜 밀폐 용기에 넣어 병원에 간다.", type: "danger", correct: false },
                    { text: "② 생리식염수를 적신 깨끗한 거즈로 감싸 비닐봉지에 넣고 완전히 밀봉한 후, 이를 얼음물 통에 담가 간접적으로 차갑게 보관한다.", type: "evidence", correct: true },
                    { text: "③ 절단 부위 조직의 동결을 방지하기 위해 상온의 우유나 이온 음료에 직접 담가 보존액 역할을 하도록 보관한다.", type: "observation", correct: false },
                    { text: "④ 지혈 분말가루를 상처와 절단 단면에 다량 살포해 피를 완전히 멎게 한 뒤 거즈로 단단히 밀봉한다.", type: "danger", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 세포 조직의 수분과 온도 유지를 위해 식염수 거즈로 감싼 후 이중 밀봉하여 얼음물에 '간접' 냉장 보관하는 것이 현존하는 가장 완벽한 조직 보존 지침입니다.",
                wrongFeedback: "[위험한 선택입니다!] 소독약이나 알코올에 담그면 조직 세포가 다 녹아 접합이 불가능해집니다. 또한 얼음에 살점이 직접 닿아도 동상으로 접합이 실패하며 지혈 가루 역시 단면을 괴사시키는 최악의 조치입니다."

            {

                title: "환절기에 코피가 한 번 나면 멈추지 않고 30분 이상 지속적으로 흘러내린다.",
                choices: [
                    { text: "① 코피가 목구멍 뒤로 넘어가지 않도록 머리를 앞으로 숙이고, 코망울 양쪽을 손가락으로 5~10분간 강하게 압박한다.", type: "evidence", correct: true },
                    { text: "② 머리를 뒤로 완전히 젖혀 기도를 확보하고, 차가운 수건을 콧등에 얹어 혈관을 가라앉힌다.", type: "danger", correct: false },
                    { text: "③ 지혈을 신속하게 돕기 위해 거친 티슈나 솜을 말아 콧구멍 깊숙이 쑤셔 넣고 코뼈 윗부분을 꾹 누른다.", type: "danger", correct: false },
                    { text: "④ 피를 너무 많이 흘려 빈혈이 오거나 저혈압 쇼크가 올 수 있으니 지혈 시까지 서서히 물이나 음료를 먹인다.", type: "observation", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 머리를 약간 숙여 피가 목뒤로 넘어가 기도를 폐쇄하거나 위장 장애를 유발하는 것을 막고, 가장 약하고 혈관이 몰려 있는 코망울(연골 부분)을 지속해서 지압 지혈하는 것이 기본 정석입니다.",
                wrongFeedback: "[위험한 선택입니다!] 고개를 뒤로 젖히면 피가 기도로 넘어가 흡인성 폐렴을 일으킵니다. 또 일반 거친 휴지를 깊게 쑤셔 넣는 것은 휴지를 제거할 때 딱지가 함께 떨어져 상처를 더 크게 벌립니다."
            },
            {
                icon: "🧠 상황 9: 급성 안면 비대칭",
                title: "식사를 함께하던 중 친구가 갑자기 말의 어눌함을 보이며 한쪽 얼굴 입꼬리가 무겁게 처져 올라가지 않는다.",
                choices: [
                    { text: "① 안면 신경 마비의 초기 증상일 수 있으므로 얼굴 근육을 자극하기 위해 껌을 씹게 하거나 계속 말을 시킨다.", type: "observation", correct: false },
                    { text: "② 일시적인 혈액 공급 불균형에 의한 혈액 순환장애이므로 손발 끝을 바늘로 정성껏 따서 사혈을 유도한다.", type: "danger", correct: false },
                    { text: "③ 즉시 얼굴을 따뜻한 수건으로 마사지하며 누워서 전신 안정을 취하게 한 후 상황을 더 관찰한다.", type: "danger", correct: false },
                    { text: "④ 급성 뇌졸중(뇌혈관 차단)의 초특급 적신호이므로 1분 1초라도 지체하지 않고 바로 119 구급차를 탑승한다.", type: "prompt", correct: true }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 편측 마비와 안면 비대칭, 언어 장애는 대표적인 급성 뇌졸중(FAST) 증상입니다. 골든타임 3~4시간이 넘어가면 마비 치료가 불가능하므로 즉각적인 구급차 수송이 답입니다.",
                wrongFeedback: "[위험한 선택입니다!] 민간요법처럼 손을 따거나 누워서 자게 두는 것은 치료의 금쪽같은 골든타임을 그냥 흘려보내 환자를 영구 마비 혹은 생명 위협으로 몰아넣는 지극히 위험한 행동입니다."
            },
            {
                icon: "🥶 상황 10: 급성 저체온증",
                title: "혹한기 등산 후 하산한 환자가 사지를 심하게 떨더니, 점차 떨림을 멈추고 헛소리를 하며 주저앉는다.",
                choices: [
                    { text: "① 체온을 급격히 끌어올리기 위해 환자의 사지와 얼어붙은 손끝을 마찰열이 나도록 아주 세고 매섭게 비비고 주무른다.", type: "danger", correct: false },
                    { text: "② 신속하게 젖은 옷을 전부 완전히 벗겨 차단하고, 마른 담요나 전용 보온 포로 몸 전체를 가온시킨다.", type: "evidence", correct: true },
                    { text: "③ 동상을 해결하고 중심 체온을 급속도로 회복하기 위해 뜨거운 열탕 속에 환자를 즉시 입수시킨다.", type: "danger", correct: false },
                    { text: "④ 알코올이 말초 혈관을 확장해 몸에 열을 내도록 따뜻하게 데운 술을 강제로 주입한다.", type: "observation", correct: false }
                ],
                correctFeedback: "[훌륭한 판단입니다!] 저체온증 환자는 젖은 옷을 가위로 잘라내어 열 손실을 신속하게 끊고, 몸통 부위 중심부터 점진적으로 미지근하게 열을 전달하여 중심 체온을 올려야 정상 혈압을 안전하게 복원합니다.",
                wrongFeedback: "[위험한 선택입니다!] 갑자기 뜨거운 물에 집어넣거나 술을 주는 행위는 말초 신경 혈관을 급격하게 팽창시켜 중심 혈액을 급속도로 빠져나가게 해 '쇼크에 의한 심정지(Rewarming Shock)'를 초래합니다."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const personalityScores = {
            prompt: 0,
            evidence: 0,
            observation: 0,
            danger: 0
        };

        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            personalityScores.prompt = 0;
            personalityScores.evidence = 0;
            personalityScores.observation = 0;
            personalityScores.danger = 0;
            
            showQuestion();
            nextScene('scene-quiz');
        }

        function nextScene(sceneId) {
            const scenes = document.querySelectorAll('.scene');
            scenes.forEach(scene => scene.classList.remove('active'));
            document.getElementById(sceneId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function showQuestion() {
            const data = quizData[currentQuestionIndex];
            
            document.getElementById('quiz-progress').innerText = `상황 ${currentQuestionIndex + 1} / 10`;
            document.getElementById('quiz-icon').innerText = data.icon;
            document.getElementById('quiz-title').innerText = data.title;

            const choicesContainer = document.getElementById('quiz-choices');
            choicesContainer.innerHTML = '';

            data.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'btn-choice';
                btn.innerText = choice.text;
                btn.onclick = () => selectAnswer(choice);
                choicesContainer.appendChild(btn);
            });
        }

        function selectAnswer(choice) {
            const currentData = quizData[currentQuestionIndex];
            const feedbackContent = document.getElementById('feedback-content');

            if (personalityScores[choice.type] !== undefined) {
                personalityScores[choice.type] += 1;
            }

            if (choice.correct) {
                score += 1;
                feedbackContent.innerHTML = `
                    <span style="color: #4CAF50; font-weight:bold; font-size:1.2rem;">🟢 올바른 대처입니다!</span><br><br>
                    ${currentData.correctFeedback}
                `;
            } else {
                feedbackContent.innerHTML = `
                    <span style="color: #F44336; font-weight:bold; font-size:1.2rem;">❌ 잘못된 민간상식 조치입니다!</span><br><br>
                    ${currentData.wrongFeedback}
                `;
            }

            nextScene('scene-feedback');
        }

        function goToNext() {
            currentQuestionIndex += 1;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
                nextScene('scene-quiz');
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('score-display').innerText = `10문제 중 ${score}개 올바른 판단`;

            let maxType = 'evidence';
            let maxScore = -1;
            for (const [type, val] of Object.entries(personalityScores)) {
                if (val > maxScore) {
                    maxScore = val;
                    maxType = type;
                }
            }

            const typeContent = document.getElementById('type-content');
            
            if (maxType === 'prompt') {
                typeContent.innerHTML = `
                    <strong>⚡ 신속형 의사결정자 (The Prompt Responder)</strong><br><br>
                    당신은 응급상황에서 망설임 없이 확실한 구급 조치와 골든타임을 확보하려 노력하는 빠른 판단력의 소유자입니다. 생과 사를 가르는 치명적인 위기일수록 당신과 같은 단호함이 생명을 살려냅니다.
                `;
            } else if (maxType === 'evidence') {
                typeContent.innerHTML = `
                    <strong>📚 의학 근거형 분석가 (The Evidence-based Caregiver)</strong><br><br>
                    당신은 어설픈 선입견에 의지하지 않고 현대 응급의학의 입증된 사실과 디테일한 처치법을 숙지하고 있는 든든한 상식가입니다. 복잡하게 얽힌 응급 지침을 냉철하게 고르는 탁월한 브레인입니다.
                `;
            } else if (maxType === 'observation') {
                typeContent.innerHTML = `
                    <strong>🔍 신중한 관찰자 (The Calm Watcher)</strong><br><br>
                    당신은 환자 상태를 지켜보고 불필요한 움직임을 제한하여 환자를 위험으로부터 보호하려 합니다. 신중함은 좋으나, 뇌졸중이나 호흡 마비 상태에서는 과감하고 속도감 있는 조치가 생존율을 대폭 끌어올린다는 것을 명심해 주세요.
                `;
            } else {
                typeContent.innerHTML = `
                    <strong>⚠️ 위험감수형 상식가 (The Risky Folk-mediciner)</strong><br><br>
                    당신은 영화나 미디어, 조상들의 민간지식에 의도치 않게 익숙했던 편입니다. 하지만 안타깝게도 우리가 '안전하다'고 믿었던 사혈, 마찰열 비비기, 입으로 빨아내기 등은 환자의 치사율을 가속시키는 요인입니다. 이번 테스트로 완전히 바로잡으셨길 바랍니다!
                `;
            }

            nextScene('scene-result');
        }
    </script>
</body>
</html>
